<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Factory Studio</title>
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #141416;
    --surface2: #1c1c20;
    --border: #2a2a2f;
    --text: #e4e4e7;
    --text2: #a1a1aa;
    --accent: #8b5cf6;
    --accent2: #a78bfa;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --radius: 8px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── Layout ── */
  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  header h1 span { color: var(--accent); }

  .connection-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    display: inline-block;
    margin-right: 8px;
    transition: background 0.3s;
  }

  .connection-dot.connected { background: var(--green); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--text2);
  }

  /* ── Pipeline ── */
  .pipeline {
    display: flex;
    gap: 4px;
    margin-bottom: 32px;
  }

  .phase-pill {
    flex: 1;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .phase-pill:hover { border-color: var(--accent); }
  .phase-pill.active { border-color: var(--accent); background: var(--surface2); }

  .phase-pill .phase-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .phase-pill .phase-name {
    font-size: 14px;
    font-weight: 500;
  }

  .phase-pill .phase-status {
    font-size: 11px;
    margin-top: 6px;
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  .phase-status.locked { background: var(--surface2); color: var(--text2); }
  .phase-status.in_progress { background: #1e3a5f; color: var(--blue); }
  .phase-status.awaiting_approval { background: #3d2e00; color: var(--yellow); }
  .phase-status.done { background: #0a3622; color: var(--green); }

  /* ── Main grid ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 24px;
  }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .pipeline { flex-wrap: wrap; }
    .phase-pill { flex: 1 1 calc(50% - 4px); min-width: 140px; }
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-body {
    padding: 18px;
  }

  .card + .card { margin-top: 16px; }

  /* ── Artifact viewer ── */
  .artifact-content {
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text2);
    max-height: 500px;
    overflow-y: auto;
  }

  .artifact-content::-webkit-scrollbar { width: 6px; }
  .artifact-content::-webkit-scrollbar-track { background: transparent; }
  .artifact-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
    font-size: 14px;
  }

  .empty-state .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }

  /* ── Approval panel ── */
  .approval-panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface2);
    color: var(--text);
    width: 100%;
  }

  .btn:hover { border-color: var(--text2); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-approve {
    background: #0a3622;
    border-color: #166534;
    color: var(--green);
  }
  .btn-approve:hover:not(:disabled) { background: #14532d; }

  .btn-feedback {
    background: #3d2e00;
    border-color: #854d0e;
    color: var(--yellow);
  }
  .btn-feedback:hover:not(:disabled) { background: #4a3600; }

  /* ── Feedback textarea ── */
  textarea {
    width: 100%;
    min-height: 80px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    resize: vertical;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: #52525b; }

  /* ── PRD Form ── */
  .prd-form { display: flex; flex-direction: column; gap: 16px; }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .form-group textarea {
    min-height: 100px;
  }

  .form-group input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
  }
  .form-group input:focus { border-color: var(--accent); }

  /* ── Tasks ── */
  .task-list {
    list-style: none;
    font-size: 13px;
  }

  .task-list li {
    padding: 6px 0;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    color: var(--text2);
  }

  .task-list li .check {
    width: 16px;
    height: 16px;
    border: 1px solid var(--border);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .task-list li.done .check {
    background: var(--green);
    border-color: var(--green);
  }

  .task-list li.done { color: #52525b; text-decoration: line-through; }

  /* ── Progress log ── */
  .progress-log {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    line-height: 1.8;
    max-height: 200px;
    overflow-y: auto;
  }

  /* ── Notification ── */
  .notification {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
  }

  .notification.show { transform: translateY(0); opacity: 1; }
  .notification.success { background: #14532d; color: var(--green); border: 1px solid #166534; }
  .notification.error { background: #451a1a; color: var(--red); border: 1px solid #7f1d1d; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--bg);
    padding: 2px;
    border-radius: 6px;
  }

  .tab {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    border: none;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    border-radius: 4px;
    font-family: var(--font);
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { background: var(--surface2); color: var(--text); }

  /* ── Visible sections ── */
  .section { display: none; }
  .section.visible { display: block; }

  /* ── Command hint ── */
  .cmd-hint {
    padding: 10px 14px;
    background: var(--bg);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent2);
    margin-top: 12px;
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1><span>DF</span> Studio</h1>
    <div class="header-right">
      <span class="connection-dot" id="connDot"></span>
      <span id="connText">Connecting...</span>
      <span id="projectName" style="margin-left: 12px; color: var(--accent)"></span>
    </div>
  </header>

  <!-- Pipeline overview -->
  <div class="pipeline" id="pipeline"></div>

  <!-- Main content -->
  <div class="main-grid">
    <!-- Left: Content area -->
    <div>
      <!-- No pipeline state -->
      <div class="section" id="sec-empty">
        <div class="card">
          <div class="card-body">
            <div class="empty-state">
              <div class="icon">&#9672;</div>
              <p>Keine aktive Pipeline</p>
              <p style="margin-top:8px; font-size:13px">Starte Claude Code im Terminal und führe <code style="color:var(--accent)">/df:start</code> aus.</p>
            </div>
          </div>
        </div>
      </div>

      <!-- PRD Input Form (Phase 01) -->
      <div class="section" id="sec-prd">
        <div class="card">
          <div class="card-header">Phase 01 — Projekt-Input</div>
          <div class="card-body">
            <div class="prd-form">
              <div class="form-group">
                <label>Projektname</label>
                <input type="text" id="prdName" placeholder="z.B. Invoice Manager, Team Dashboard...">
              </div>
              <div class="form-group">
                <label>Was soll die App tun?</label>
                <textarea id="prdVision" placeholder="Beschreib frei, was du bauen willst. Was ist der Kernzweck?"></textarea>
              </div>
              <div class="form-group">
                <label>Wer benutzt die App? (Rollen/Akteure)</label>
                <textarea id="prdActors" placeholder="z.B. Admin kann Nutzer verwalten, User kann Rechnungen erstellen..."></textarea>
              </div>
              <div class="form-group">
                <label>Einschränkungen &amp; Anforderungen</label>
                <textarea id="prdConstraints" placeholder="Hosting, Auth, Compliance, Budget, bestehende Systeme..."></textarea>
              </div>
              <div class="form-group">
                <label>Sonstige Notizen</label>
                <textarea id="prdNotes" placeholder="Alles weitere was wichtig ist..." style="min-height:60px"></textarea>
              </div>
              <button class="btn" onclick="submitPrompt()" id="btnSubmitPrompt">Prompt an Claude Code senden</button>
              <div class="cmd-hint" id="prdHint" style="display:none"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Artifact viewer -->
      <div class="section" id="sec-artifact">
        <div class="card">
          <div class="card-header">
            <span id="artifactTitle">Artifact</span>
            <div class="tabs" id="artifactTabs"></div>
          </div>
          <div class="card-body">
            <div class="artifact-content" id="artifactContent">Lade...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Sidebar -->
    <div>
      <!-- Actions -->
      <div class="card" id="actionsCard">
        <div class="card-header">Aktionen</div>
        <div class="card-body">
          <div class="approval-panel">
            <button class="btn btn-approve" id="btnApprove" onclick="approve()" disabled>Approve Phase</button>
            <textarea id="feedbackText" placeholder="Feedback eingeben..."></textarea>
            <button class="btn btn-feedback" id="btnFeedback" onclick="sendFeedback()" disabled>Feedback senden</button>
          </div>
        </div>
      </div>

      <!-- Tasks -->
      <div class="card" id="tasksCard">
        <div class="card-header">
          <span>Tasks</span>
          <span id="taskCount" style="font-size:12px; font-weight:400"></span>
        </div>
        <div class="card-body">
          <ul class="task-list" id="taskList">
            <li style="color:var(--text2)">Keine Tasks</li>
          </ul>
        </div>
      </div>

      <!-- Progress -->
      <div class="card">
        <div class="card-header">Activity Log</div>
        <div class="card-body">
          <div class="progress-log" id="progressLog">Kein Log vorhanden</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Notification -->
<div class="notification" id="notification"></div>

<script>
const API = '';
let state = { active: false };
let selectedPhase = null;
let connected = false;

// ── SSE Live Connection ──
function connectSSE() {
  const es = new EventSource(`${API}/api/events`);
  es.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'connected') {
      connected = true;
      document.getElementById('connDot').classList.add('connected');
      document.getElementById('connText').textContent = 'Live';
    }
    if (data.type === 'update') refresh();
  };
  es.onerror = () => {
    connected = false;
    document.getElementById('connDot').classList.remove('connected');
    document.getElementById('connText').textContent = 'Reconnecting...';
  };
}

// ── Data fetching ──
async function refresh() {
  try {
    const res = await fetch(`${API}/api/status`);
    state = await res.json();
    render();
  } catch {
    document.getElementById('connDot').classList.remove('connected');
    document.getElementById('connText').textContent = 'Offline';
  }
}

async function loadArtifact(phase) {
  try {
    const res = await fetch(`${API}/api/artifact/${phase}`);
    const data = await res.json();
    return data.content;
  } catch { return null; }
}

async function loadProgress() {
  try {
    const res = await fetch(`${API}/api/progress`);
    const data = await res.json();
    return data.entries || [];
  } catch { return []; }
}

// ── Render ──
function render() {
  const pipeline = document.getElementById('pipeline');
  const phaseNames = ['Prompt & PRD', 'Design Review', 'Datenmodell', 'Stack Review', 'Build'];
  const phaseIcons = ['01', '02', '03', '04', '05'];

  document.getElementById('projectName').textContent = state.active ? state.project : '';

  if (!state.active) {
    pipeline.innerHTML = phaseNames.map((name, i) => `
      <div class="phase-pill">
        <div class="phase-num">Phase ${phaseIcons[i]}</div>
        <div class="phase-name">${name}</div>
        <span class="phase-status locked">locked</span>
      </div>
    `).join('');
    showSection('sec-empty');
    document.getElementById('btnApprove').disabled = true;
    document.getElementById('btnFeedback').disabled = true;
    return;
  }

  // Render pipeline pills
  pipeline.innerHTML = state.phases.map((p, i) => `
    <div class="phase-pill ${selectedPhase === p.phase ? 'active' : ''}"
         onclick="selectPhase(${p.phase})">
      <div class="phase-num">Phase ${phaseIcons[i]}</div>
      <div class="phase-name">${p.name}</div>
      <span class="phase-status ${p.status}">${formatStatus(p.status)}</span>
    </div>
  `).join('');

  // Auto-select current phase if none selected
  if (!selectedPhase) selectedPhase = state.currentPhase;
  selectPhase(selectedPhase);

  // Enable/disable approval buttons
  const canApprove = state.currentStatus === 'awaiting_approval';
  document.getElementById('btnApprove').disabled = !canApprove;
  document.getElementById('btnFeedback').disabled = !canApprove;

  // Render tasks
  renderTasks();
  renderProgress();
}

function renderTasks() {
  const list = document.getElementById('taskList');
  const count = document.getElementById('taskCount');
  const all = [...(state.doneTasks || []).map(t => ({ text: t, done: true })), ...(state.openTasks || []).map(t => ({ text: t, done: false }))];

  if (all.length === 0) {
    list.innerHTML = '<li style="color:var(--text2)">Keine Tasks</li>';
    count.textContent = '';
    return;
  }

  const open = all.filter(t => !t.done).length;
  count.textContent = `${open} offen`;

  list.innerHTML = all.map(t => `
    <li class="${t.done ? 'done' : ''}">
      <div class="check"></div>
      <span>${t.text}</span>
    </li>
  `).join('');
}

async function renderProgress() {
  const log = document.getElementById('progressLog');
  const entries = await loadProgress();
  if (entries.length === 0) {
    log.textContent = 'Kein Log vorhanden';
    return;
  }
  log.textContent = entries.join('\n');
}

async function selectPhase(phase) {
  selectedPhase = phase;

  // Update active pill
  document.querySelectorAll('.phase-pill').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === phase);
  });

  // Phase 01 with no pipeline: show PRD form
  if (phase === 1 && state.active && state.currentPhase === 1 && state.currentStatus === 'in_progress') {
    showSection('sec-prd');
    return;
  }

  // Load artifact
  const content = await loadArtifact(phase);
  const names = { 1: 'spec.md', 2: 'architecture.md', 3: 'schema.prisma', 4: 'project-context.md' };

  if (content) {
    document.getElementById('artifactTitle').textContent = names[phase] || `Phase ${phase}`;
    document.getElementById('artifactContent').textContent = content;
    showSection('sec-artifact');
  } else if (phase === 5) {
    document.getElementById('artifactTitle').textContent = 'Build Phase';
    document.getElementById('artifactContent').textContent = state.phases[4]?.status === 'locked'
      ? 'Phase 05 ist noch gesperrt. Erst Phase 04 approven.'
      : 'Build läuft in Claude Code im Terminal.\nNutze /df:status dort für Details.';
    showSection('sec-artifact');
  } else {
    document.getElementById('artifactTitle').textContent = names[phase] || `Phase ${phase}`;
    document.getElementById('artifactContent').textContent = `Phase ${phase} hat noch kein Artefakt generiert.`;
    showSection('sec-artifact');
  }
}

// ── Actions ──
async function approve() {
  const btn = document.getElementById('btnApprove');
  btn.disabled = true;
  btn.textContent = 'Approving...';
  try {
    const res = await fetch(`${API}/api/approve`, { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      notify(`Phase ${data.phase} approved!`, 'success');
      selectedPhase = data.next || selectedPhase;
      await refresh();
    } else {
      notify(data.error, 'error');
    }
  } catch (e) {
    notify('Fehler: ' + e.message, 'error');
  }
  btn.textContent = 'Approve Phase';
}

async function sendFeedback() {
  const text = document.getElementById('feedbackText').value.trim();
  if (!text) return;

  try {
    const res = await fetch(`${API}/api/feedback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ feedback: text }),
    });
    const data = await res.json();
    if (data.ok) {
      notify('Feedback gespeichert — Claude Code sieht es beim nächsten Read.', 'success');
      document.getElementById('feedbackText').value = '';
      await refresh();
    }
  } catch (e) {
    notify('Fehler: ' + e.message, 'error');
  }
}

async function submitPrompt() {
  const name = document.getElementById('prdName').value.trim();
  const vision = document.getElementById('prdVision').value.trim();
  const actors = document.getElementById('prdActors').value.trim();
  const constraints = document.getElementById('prdConstraints').value.trim();
  const notes = document.getElementById('prdNotes').value.trim();

  if (!vision) { notify('Bitte beschreibe was die App tun soll.', 'error'); return; }

  try {
    const res = await fetch(`${API}/api/prompt`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, vision, actors, constraints, notes }),
    });
    const data = await res.json();
    if (data.ok) {
      notify('Prompt gespeichert!', 'success');
      const hint = document.getElementById('prdHint');
      hint.style.display = 'block';
      hint.textContent = `Gespeichert in studio/prompt-input.md\n\nJetzt in Claude Code eingeben:\n/df:start`;
    }
  } catch (e) {
    notify('Fehler: ' + e.message, 'error');
  }
}

// ── Helpers ──
function showSection(id) {
  document.querySelectorAll('.section').forEach(el => el.classList.remove('visible'));
  const el = document.getElementById(id);
  if (el) el.classList.add('visible');
}

function formatStatus(s) {
  const map = { locked: 'locked', in_progress: 'in progress', awaiting_approval: 'awaiting approval', done: 'done' };
  return map[s] || s;
}

function notify(msg, type = 'success') {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.className = `notification ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Init ──
connectSSE();
refresh();
// Poll every 5s as backup
setInterval(refresh, 5000);
</script>
</body>
</html>
